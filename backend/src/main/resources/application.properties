spring.application.name=backend
spring.datasource.url=${SUPABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_USER:postgres}
spring.datasource.password=${SUPABASE_PASSWORD:postgres}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
